name: Android Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signing_precheck:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      missing: ${{ steps.check.outputs.missing }}
    steps:
      - name: Validate signing secrets
        id: check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=""
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing# }" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - name: Precheck summary
        run: |
          if [ "${{ steps.check.outputs.ready }}" = "true" ]; then
            echo "Signing secrets are configured. Release build will run."
          else
            echo "::warning::Skipping Android release build. Missing secrets: ${{ steps.check.outputs.missing }}"
          fi

  release:
    needs: signing_precheck
    if: ${{ needs.signing_precheck.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    env:
      APP_VERSION_CODE: ${{ vars.APP_VERSION_CODE || '1' }}
      APP_VERSION_NAME: ${{ vars.APP_VERSION_NAME || '1.0.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Prepare keystore.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/secure
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/secure/upload-keystore.jks
          cat > android/keystore.properties <<EOF
          storeFile=../secure/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed prodRelease (APK + AAB)
        run: |
          cd android
          ./gradlew --no-daemon clean assembleProdRelease bundleProdRelease app:sizeReport --console=plain \
            -PAPP_VERSION_CODE="$APP_VERSION_CODE" \
            -PAPP_VERSION_NAME="$APP_VERSION_NAME"

      - name: Verify zipalign and signatures
        run: |
          BUILD_TOOLS="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)"
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          shopt -s nullglob
          for apk in android/app/build/outputs/apk/prod/release/*.apk; do
            "$ZIPALIGN" -c -v 4 "$apk"
            "$APKSIGNER" verify --verbose "$apk"
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-release-v${{ env.APP_VERSION_NAME }}-${{ github.run_number }}
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/prod/release/*.apk
            android/app/build/outputs/bundle/prodRelease/*.aab
            android/build/reports/release/artifact-size-report.txt

  release_skipped:
    needs: signing_precheck
    if: ${{ needs.signing_precheck.outputs.ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: |
          echo "Android release workflow skipped."
          echo "Missing secrets: ${{ needs.signing_precheck.outputs.missing }}"
          echo "Configure repository secrets to enable signed Android release builds."
